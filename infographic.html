<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Ingredient Infographic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Set Inter font globally */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7; /* Light Grey Background */
        }
        
        /* Custom styles for the tea cup shape (Vertical Stacking, Sharp Top, Rounded Bottom) */
        .tea-cup-container {
            /* Width (48%) and Max-width retained */
            width: 48%;      
            max-width: 280px; 
            
            height: 120px;     
            border: 4px solid #303030; /* UPDATED: Dark Gray Border */
            
            /* Sharp top, wide bottom curve retained */
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            /* CRITICAL: Keep container border radius fixed at 25px */
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            
            /* overflow: hidden removed to show handle */
            position: relative;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); 
            display: flex; 
            
            flex-direction: column-reverse; /* Stack ingredients vertically (bottom-up) */
        }
        
        /* Tea Cup Handle - Now a hollow rectangular block with curved bottom-right, NO rotation */
        .tea-cup-container::after {
            content: '';
            position: absolute;
            right: -27px;  /* Adjusted for increased width (was -15px) */
            top: 25px;      /* Set to 25px (was 15px) */
            width: 50px;   /* Width doubled from 25px to 50px */
            height: 55px;  /* INCREASED from 50px to 55px */
            background-color: transparent; /* Make it hollow */
            border: 4px solid #303030; /* UPDATED: Dark Gray for handle stroke */
            
            /* Apply specific border-radius to create the shape */
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 20px; /* Reduced from 25px to 20px */
            
            /* Hide the left border to create the opening, if desired, otherwise all 4 borders visible */
            border-left-color: transparent; /* This creates the opening towards the cup */
            
            /* Rotation removed */
            z-index: 5; 
        }

        .ingredient-layer {
            position: relative;
            width: 100%; /* Take full width of its vertical parent */
            z-index: 10;
        }

        /* Adjust text color for dark backgrounds for readability */
        .text-on-dark {
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        /* Texture overlay for ingredients */
        .texture-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.08) 0%, transparent 10%),
                radial-gradient(circle at 90% 80%, rgba(0,0,0,0.05) 0%, transparent 10%);
            background-size: 15px 15px; /* Adjust size for finer or coarser grain */
            opacity: 0.8; /* Subtle opacity */
            pointer-events: none; /* Allows clicks to pass through to the actual layer */
            mix-blend-mode: soft-light; /* Blends nicely with the background color */
        }
    </style>
</head>
<body class="bg-neutral-50 min-h-screen text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        
        <!-- Header --><header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-indigo-700 mb-2"> <!-- Updated: Text color -->The Anatomy of Tea
            </h1>
            <p class="text-xl text-gray-600">
                A visual guide to what's inside your perfect brew.
            </p>
        </header>

        <!-- Infographic Grid Container --><div id="coffee-infographic" 
             class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <!-- Content generated by JavaScript --></div>

    </div>

    <script>
        // Data for the tea types and their ingredients (in "units"). 
        // Max total units is 10, which represents 100% of the visual cup HEIGHT.
        const teaData = [
            // Added 'honey: 0' to all existing recipes for consistency
            { name: "Black Tea", units: { tea: 7, milk: 0, ginger: 0, lemon: 0, ice: 0, water: 3, greenBlend: 0, herbalPowder: 0, honey: 0 }, desc: "Strong, simple black tea infusion." },
            { name: "Green Tea", units: { tea: 4, milk: 0, ginger: 0, lemon: 0, ice: 0, water: 5, greenBlend: 1, herbalPowder: 0, honey: 0 }, desc: "Lighter, more delicate tea base with a hint of green." },
            { name: "Milk Tea", units: { tea: 4, milk: 6, ginger: 0, lemon: 0, ice: 0, water: 0, greenBlend: 0, herbalPowder: 0, honey: 0 }, desc: "Classic combination of tea and creamer." },
            { name: "Herbal Tea", units: { tea: 2, milk: 0, ginger: 0, lemon: 0, ice: 0, water: 7, greenBlend: 0, herbalPowder: 1, honey: 0 }, desc: "Mostly hot water infused with herbs and botanicals." },
            { name: "Ginger Tea", units: { tea: 3, milk: 0, ginger: 2, lemon: 0, ice: 0, water: 5, greenBlend: 0, herbalPowder: 0, honey: 0 }, desc: "A spicy blend with real ginger flavor." }, 
            { name: "Lemon Tea", units: { tea: 4, milk: 0, ginger: 0, lemon: 2, ice: 0, water: 4, greenBlend: 0, herbalPowder: 0, honey: 0 }, desc: "A bright, tart blend with lemon flavor." }, 
            { name: "Iced Tea", units: { tea: 4, milk: 0, ginger: 0, lemon: 0, ice: 4, water: 2, greenBlend: 0, herbalPowder: 0, honey: 0 }, desc: "Sweetened tea concentrate chilled with ice." }, 
            { name: "Honey Tea", units: { tea: 4, milk: 0, ginger: 0, lemon: 0, ice: 0, water: 5, greenBlend: 0, herbalPowder: 0, honey: 1 }, desc: "Classic black tea base sweetened with a touch of honey." }
        ];

        // Total possible units for scaling (Max of all teas)
        const MAX_TOTAL_UNITS = 10;
        
        // Define Tailwind colors for the ingredients (Tea theme colors)
        const INGREDIENT_COLORS = {
            tea: "bg-red-900",          // Primary Tea/Herbal Infusion (Dark)
            milk: "bg-gray-200",        // Milk/Creamer (Light Gray/Cream)
            ginger: "bg-orange-600",    // Ginger Flavor (Warm, Spicy)
            lemon: "bg-yellow-400",     // Lemon Flavor (Bright, Tart)
            ice: "bg-sky-500",          // Actual Ice/Chiller (Deeper Blue)
            greenBlend: "bg-emerald-400", // Green Blend (Brighter Green)
            herbalPowder: "bg-amber-700", // Herbal Powder (Earthy Brown)
            honey: "bg-yellow-600",     // NEW: Honey (Gold/Sweet)
            water: "bg-sky-300"         // Water Base (Light Blue)
        };

        const infographicContainer = document.getElementById('coffee-infographic');

        /**
         * Renders the entire infographic by calculating vertical layer heights.
         */
        function renderInfographic() {
            let html = '';

            teaData.forEach(tea => {
                
                // Define the list of teas that need a decreased corner radius on the bottom strip
                const targetTeas = [
                    "Black Tea", "Green Tea", "Milk Tea", "Herbal Tea", "Ginger Tea", "Lemon Tea", "Honey Tea"
                ];
                const isTargetTea = targetTeas.includes(tea.name);

                // Decrease radius by 3px (25px - 3px = 22px) for target teas, otherwise use default 25px
                const currentBottomRadius = isTargetTea ? '22px' : '25px';

                // Calculate percentages based on the total HEIGHT
                const teaHeight = (tea.units.tea / MAX_TOTAL_UNITS) * 100;
                const milkHeight = (tea.units.milk / MAX_TOTAL_UNITS) * 100;
                const waterHeight = (tea.units.water / MAX_TOTAL_UNITS) * 100;
                const gingerHeight = (tea.units.ginger / MAX_TOTAL_UNITS) * 100;
                const lemonHeight = (tea.units.lemon / MAX_TOTAL_UNITS) * 100;
                const iceHeight = (tea.units.ice / MAX_TOTAL_UNITS) * 100;
                const greenBlendHeight = (tea.units.greenBlend / MAX_TOTAL_UNITS) * 100;
                const herbalPowderHeight = (tea.units.herbalPowder / MAX_TOTAL_UNITS) * 100;
                const honeyHeight = (tea.units.honey / MAX_TOTAL_UNITS) * 100;


                // 1. Define all possible layers and filter out zero-height layers
                let layerComponents = [
                    // Stacked in visual order: Bottom to Top
                    { size: waterHeight, color: INGREDIENT_COLORS.water, label: 'Water Base' },
                    { size: gingerHeight, color: INGREDIENT_COLORS.ginger, label: 'Ginger Flavor' }, 
                    { size: lemonHeight, color: INGREDIENT_COLORS.lemon, label: 'Lemon Flavor' },
                    { size: honeyHeight, color: INGREDIENT_COLORS.honey, label: 'Honey' }, 
                    { size: greenBlendHeight, color: INGREDIENT_COLORS.greenBlend, label: 'Green Blend' }, 
                    { size: herbalPowderHeight, color: INGREDIENT_COLORS.herbalPowder, label: 'Herbal Powder' }, 
                    { size: teaHeight, color: INGREDIENT_COLORS.tea, label: 'Tea Infusion' },   
                    { size: milkHeight, color: INGREDIENT_COLORS.milk, label: 'Milk/Creamer' }, 
                    { size: iceHeight, color: INGREDIENT_COLORS.ice, label: 'Ice' }, 
                ].filter(l => l.size > 0); 

                // 2. Map component data to HTML strings, applying styles to the bottom-most layer
                layerComponents = layerComponents.map((layer, index) => {
                    
                    // Add subtle border-top to all layers EXCEPT the first one (the base)
                    const separatorClass = index > 0 ? 'border-t border-white/40' : '';
                    
                    // Logic for text contrast adjustment (checking against all dark colors)
                    const isDarkColor = layer.color.includes('red-900') || layer.color.includes('orange-600') || layer.color.includes('sky-500') || layer.color.includes('amber-700') || layer.color.includes('yellow-600'); 
                    const textColorClass = isDarkColor ? 'text-on-dark' : 'text-gray-900';

                    // Apply the specific radius for the bottom layer of these selected teas
                    const bottomRadiusStyle = index === 0 
                        ? `border-bottom-left-radius: ${currentBottomRadius}; border-bottom-right-radius: ${currentBottomRadius}; margin-bottom: -1px;` 
                        : '';


                    return `
                        <div class="ingredient-layer ${layer.color} ${separatorClass} texture-overlay" 
                             style="height: ${layer.size}%; width: 100%; ${bottomRadiusStyle}"
                             title="${layer.label}: ${layer.size.toFixed(1)}%">
                            <span class="absolute inset-0 flex items-center justify-center text-xs font-semibold text-center 
                                         ${textColorClass} opacity-80 p-1">
                                 ${layer.label}
                            </span>
                        </div>
                    `;
                });
                
                const layers = layerComponents.join('');

                // Render the tea card
                html += `
                    <div class="flex flex-col items-center bg-white p-4 rounded-xl shadow-lg hover:shadow-xl transition duration-300">
                        <!-- Tea Cup Container (Vertical) --><div class="tea-cup-container">
                            ${layers}
                        </div>
                        
                        <!-- Title and Description --><h3 class="text-xl font-bold text-gray-800 mt-2 text-center">${tea.name}</h3>
                        <p class="text-xs text-gray-500 text-center mt-1 h-10">${tea.desc}</p>
                    </div>
                `;
            });

            infographicContainer.innerHTML = html;
        }

        // Run the rendering function when the page loads
        window.onload = renderInfographic;

    </script>
</body>
</html>
